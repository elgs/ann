<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
<title>Neural Network Visualizer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
  h1 { margin-bottom: 10px; color: #e94560; }
  #controls { margin-bottom: 15px; display: flex; gap: 15px; align-items: center; }
  #controls label { font-size: 14px; }
  #controls input { width: 80px; padding: 4px 8px; border: 1px solid #444; border-radius: 4px; background: #16213e; color: #e0e0e0; }
  #controls button { padding: 6px 16px; border: none; border-radius: 4px; background: #e94560; color: white; cursor: pointer; font-size: 14px; }
  #controls button:hover { background: #c73650; }
  canvas { border-radius: 8px; background: #16213e; cursor: crosshair; }
  #info { margin-top: 15px; font-size: 13px; color: #888; max-width: 900px; text-align: center; }
  #prediction { margin-top: 10px; font-size: 16px; padding: 10px 20px; background: #16213e; border-radius: 6px; min-height: 40px; }
  #tooltip { position: absolute; pointer-events: none; background: rgba(0,0,0,0.85); color: #fff; padding: 6px 10px; border-radius: 4px; font-size: 13px; display: none; white-space: nowrap; border: 1px solid #555; }
  .legend { display: flex; gap: 20px; margin-top: 10px; font-size: 13px; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-swatch { width: 30px; height: 4px; border-radius: 2px; }
</style>
</head>
<body>
<h1>Neural Network Visualizer</h1>
<div id="controls">
  <label>Height (ft): <input type="number" id="inputHeight" value="5.5" step="0.1" min="3" max="7" onkeydown="if(event.key==='Enter'){event.preventDefault();document.getElementById('inputWeight').focus();}"></label>
  <label>Weight (lbs): <input type="number" id="inputWeight" value="130" step="5" min="40" max="200" onkeydown="if(event.key==='Enter'){event.preventDefault();runPrediction();}"></label>
  <button onclick="runPrediction()">Predict</button>
</div>
<canvas id="canvas" width="1000" height="700"></canvas>
<div id="tooltip"></div>
<div id="prediction"></div>
<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background: #4fc3f7;"></div> Positive weight</div>
  <div class="legend-item"><div class="legend-swatch" style="background: #ef5350;"></div> Negative weight</div>
  <div class="legend-item">Line thickness = |weight|</div>
</div>
<div id="info">Load trained.json to visualize the network architecture, weights, and biases. Enter height/weight values and click Predict to see activations flow through the network. <a href="https://github.com/elgs/ann" style="color: #4fc3f7;">GitHub</a></div>

<script>
const LABELS = ['Male', 'Female', 'Child'];
const IN_BOUNDS = [[3.5, 6.5], [50, 170]];
const INPUT_LABELS = ['Height', 'Weight'];

let model = null;
let activations = null; // per-layer activations after a forward pass
let weightSegments = []; // stored for hover detection
let hoveredSegment = null;
let neuronPositions = []; // stored for hover suppression on circles

function normalize(raw) {
  return raw.map((v, i) => (v - IN_BOUNDS[i][0]) / (IN_BOUNDS[i][1] - IN_BOUNDS[i][0]));
}

function sigmoid(x) { return 1 / (1 + Math.exp(-x)); }

function softmax(arr) {
  const max = Math.max(...arr);
  const exps = arr.map(x => Math.exp(x - max));
  const sum = exps.reduce((a, b) => a + b, 0);
  return exps.map(x => x / sum);
}

function forwardPass(input) {
  const acts = [input];
  let prev = input;
  for (let li = 0; li < model.layers.length; li++) {
    const layer = model.layers[li];
    const isOutput = li === model.layers.length - 1;
    const curr = [];
    for (const neuron of layer.neurons) {
      let sum = neuron.bias;
      for (let j = 0; j < prev.length; j++) {
        sum += prev[j] * neuron.weights[j];
      }
      curr.push(isOutput ? sum : sigmoid(sum));
    }
    acts.push(curr);
    prev = curr;
  }
  // apply softmax to last layer
  const sm = softmax(acts[acts.length - 1]);
  acts[acts.length - 1] = sm;
  return acts;
}

function draw() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!model) return;

  const layers = model.layers;
  const numLayers = layers.length + 1; // +1 for input layer
  const layerSizes = [model.inputSize, ...layers.map(l => l.neurons.length)];
  const maxNeurons = Math.max(...layerSizes);

  const padX = 120, padY = 60;
  const neuronSpacing = 100;
  const layerSpacingMin = 250;
  const minHeight = maxNeurons * neuronSpacing + padY * 2;
  const minWidth = (numLayers - 1) * layerSpacingMin + padX * 2;
  canvas.height = Math.max(700, minHeight);
  canvas.width = Math.max(1000, minWidth);
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const usableW = W - padX * 2;
  const layerSpacing = usableW / (numLayers - 1);

  function neuronPos(layerIdx, neuronIdx) {
    const size = layerSizes[layerIdx];
    const totalH = size * 100;
    const startY = (H - totalH) / 2 + 50;
    return {
      x: padX + layerIdx * layerSpacing,
      y: startY + neuronIdx * 100,
    };
  }

  // Draw connections (weights)
  weightSegments = [];
  for (let li = 0; li < layers.length; li++) {
    const layer = layers[li];
    for (let ni = 0; ni < layer.neurons.length; ni++) {
      const neuron = layer.neurons[ni];
      const to = neuronPos(li + 1, ni);
      for (let wi = 0; wi < neuron.weights.length; wi++) {
        const from = neuronPos(li, wi);
        const w = neuron.weights[wi];
        const absW = Math.abs(w);
        const maxLineWidth = 5;
        const lineWidth = Math.min(maxLineWidth, absW * 0.3 + 0.5);
        const alpha = Math.min(0.9, absW * 0.05 + 0.15);
        const isHovered = hoveredSegment && hoveredSegment.li === li && hoveredSegment.ni === ni && hoveredSegment.wi === wi;

        weightSegments.push({ x1: from.x, y1: from.y, x2: to.x, y2: to.y, w, li, ni, wi });

        ctx.beginPath();
        ctx.moveTo(from.x, from.y);
        ctx.lineTo(to.x, to.y);
        if (isHovered) {
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = lineWidth + 3;
        } else {
          ctx.strokeStyle = w >= 0
            ? `rgba(79, 195, 247, ${hoveredSegment ? alpha * 0.4 : alpha})`
            : `rgba(239, 83, 80, ${hoveredSegment ? alpha * 0.4 : alpha})`;
          ctx.lineWidth = lineWidth;
        }
        ctx.stroke();
      }
    }
  }
  // Redraw hovered segment on top so it's fully visible
  if (hoveredSegment) {
    const seg = weightSegments.find(s => s.li === hoveredSegment.li && s.ni === hoveredSegment.ni && s.wi === hoveredSegment.wi);
    if (seg) {
      const absW = Math.abs(seg.w);
      const lineWidth = Math.min(5, absW * 0.3 + 0.5);
      ctx.beginPath();
      ctx.moveTo(seg.x1, seg.y1);
      ctx.lineTo(seg.x2, seg.y2);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = lineWidth + 3;
      ctx.stroke();
    }
  }

  // Draw neurons
  neuronPositions = [];
  const layerLabels = ['Input', ...layers.map((_, i) => i < layers.length - 1 ? `Hidden ${i + 1}` : 'Output')];

  for (let li = 0; li < numLayers; li++) {
    // Layer label
    const labelPos = neuronPos(li, 0);
    ctx.fillStyle = '#888';
    ctx.font = '12px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(layerLabels[li], labelPos.x, padY - 25);

    for (let ni = 0; ni < layerSizes[li]; ni++) {
      const pos = neuronPos(li, ni);
      const radius = 30;
      neuronPositions.push({ x: pos.x, y: pos.y, radius });

      // Neuron fill based on activation
      let value = null;
      if (activations && activations[li]) {
        value = activations[li][ni];
      }

      let fillColor = '#2a2a4a';
      if (value !== null && value !== undefined) {
        const intensity = Math.min(1, Math.max(0, value));
        const r = Math.round(30 + intensity * 100);
        const g = Math.round(30 + intensity * 180);
        const b = Math.round(70 + intensity * 140);
        fillColor = `rgb(${r}, ${g}, ${b})`;
      }

      ctx.beginPath();
      ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
      ctx.fillStyle = fillColor;
      ctx.fill();
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Label inside neuron
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 11px system-ui';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      if (li === 0) {
        ctx.fillText(INPUT_LABELS[ni], pos.x, pos.y - 6);
        if (value !== null && value !== undefined) {
          ctx.font = '10px system-ui';
          ctx.fillText(value.toFixed(2), pos.x, pos.y + 8);
        }
      } else if (li === numLayers - 1) {
        ctx.fillText(LABELS[ni], pos.x, pos.y - 6);
        if (value !== null && value !== undefined) {
          ctx.font = '10px system-ui';
          ctx.fillText((value * 100).toFixed(1) + '%', pos.x, pos.y + 8);
        }
      } else {
        if (value !== null && value !== undefined) {
          ctx.fillText(value.toFixed(3), pos.x, pos.y);
        }
      }

      // Bias label (for non-input layers)
      if (li > 0) {
        const neuron = layers[li - 1].neurons[ni];
        ctx.fillStyle = '#666';
        ctx.font = '10px system-ui';
        ctx.fillText('b=' + neuron.bias.toFixed(2), pos.x, pos.y + radius + 12);
      }
    }
  }
}

function runPrediction() {
  if (!model) return;
  const height = parseFloat(document.getElementById('inputHeight').value);
  const weight = parseFloat(document.getElementById('inputWeight').value);
  const norm = normalize([height, weight]);
  activations = forwardPass(norm);

  const output = activations[activations.length - 1];
  const maxIdx = output.indexOf(Math.max(...output));
  document.getElementById('prediction').innerHTML =
    `Prediction: <strong style="color: #4fc3f7;">${LABELS[maxIdx]}</strong> ` +
    `(${(output[maxIdx] * 100).toFixed(1)}%) &nbsp; [${output.map((v, i) => `${LABELS[i]}: ${(v * 100).toFixed(1)}%`).join(', ')}]`;

  draw();
}

// Load model
fetch('trained.json')
  .then(r => r.json())
  .then(data => {
    model = data;
    draw();
    runPrediction();
  })
  .catch(err => {
    document.getElementById('info').textContent = 'Error loading trained.json: ' + err.message;
  });

// Hover detection
function distToSegment(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const lenSq = dx * dx + dy * dy;
  let t = lenSq === 0 ? 0 : ((px - x1) * dx + (py - y1) * dy) / lenSq;
  t = Math.max(0, Math.min(1, t));
  const nx = x1 + t * dx, ny = y1 + t * dy;
  return Math.sqrt((px - nx) ** 2 + (py - ny) ** 2);
}

const canvas = document.getElementById('canvas');
const tooltip = document.getElementById('tooltip');

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;

  // Suppress hover when cursor is over a neuron circle
  const onCircle = neuronPositions.some(n => Math.sqrt((mx - n.x) ** 2 + (my - n.y) ** 2) <= n.radius);

  let closest = null, closestDist = Infinity;
  if (!onCircle) {
    for (const seg of weightSegments) {
      const d = distToSegment(mx, my, seg.x1, seg.y1, seg.x2, seg.y2);
      if (d < closestDist) { closestDist = d; closest = seg; }
    }
  }

  const threshold = 8;
  if (!onCircle && closest && closestDist < threshold) {
    hoveredSegment = closest;
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
    tooltip.textContent = `w = ${closest.w.toFixed(4)}`;
  } else {
    hoveredSegment = null;
    tooltip.style.display = 'none';
  }
  draw();
});

canvas.addEventListener('mouseleave', () => {
  hoveredSegment = null;
  tooltip.style.display = 'none';
  draw();
});
</script>
</body>
</html>
